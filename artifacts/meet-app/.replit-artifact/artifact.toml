kind = "web"
previewPath = "/"
title = "Smart Video Conferencing"
version = "1.0.0"
id = "artifacts/meet-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21008

[services.development]
run = "pnpm --filter @workspace/meet-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/meet-app", "run", "build" ]
publicDir = "artifacts/meet-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21008"
BASE_PATH = "/"
